version: 2

before:
  hooks:
    - go mod download

builds:
  - id: gua-server
    binary: gua-server
    main: ./cmd/
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -X github.com/CMGS/gua/version.REVISION={{.Commit}}
      - -X github.com/CMGS/gua/version.VERSION={{.Env.VERSION}}
      - -X github.com/CMGS/gua/version.BUILTAT={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: gua-bridge
    binary: gua-bridge
    main: ./agent/claude/bridge/
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: release
    builds:
      - gua-server
      - gua-bridge
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

checksum:
  name_template: 'checksums.txt'

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
